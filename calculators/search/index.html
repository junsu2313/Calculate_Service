<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>계산기 검색 | 생활 속 계산기</title>
    <meta
      name="description"
      content="생활 속 계산기에서 필요한 계산기를 검색해 검색 결과만 바로 확인할 수 있는 페이지입니다."
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="계산기 검색 | 생활 속 계산기" />
    <meta property="og:description" content="검색 결과만 모아서 필요한 계산기를 빠르게 찾아보세요." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/calculators/search/" />
    <link rel="canonical" href="https://example.com/calculators/search/" />
    <link rel="stylesheet" href="../../styles.css" />
    <script defer src="../../js/site-pages.js"></script>
    <script defer src="../../js/calculator-catalog.js"></script>
    <script defer src="../../js/common.js"></script>
    <script defer src="../../theme.js"></script>
    <script defer src="../../js/home.js"></script>
    <script defer src="../../js/calculator-search.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        if (window.LifeCalcSearch) {
          window.LifeCalcSearch.initCalculatorSearchPage();
        }
      });
    </script>
  </head>
  <body class="calc-page">
    <div class="page-shell">
      <nav class="topbar">
        <a class="brand" href="../../">생활 속 계산기</a>
        <div class="topbar-actions">
          <div class="topbar-links">
            <a href="../../">홈</a>
            <a href="../">계산기 목록</a>
            <a href="../../notices/">공지사항</a>
            <a href="../../contact/">문의하기</a>
          </div>
          <button class="ghost-btn theme-toggle" id="themeToggle" type="button">다크 모드</button>
        </div>
      </nav>

      <header class="calc-hero section salary-hero calculators-directory-hero">
        <div class="crumbs"><a href="../../">홈</a> / <a href="../">계산기 목록</a> / 검색</div>
        <h1>계산기 검색</h1>
        <p class="article-lead">검색한 키워드 기준으로 결과만 모아 확인할 수 있습니다.</p>
      </header>

      <main>
        <section class="section directory-toolbar-section">
          <form class="directory-toolbar" action="./" method="get">
            <label class="directory-search" for="calculatorSearch">
              <span>검색</span>
              <div class="directory-search-row">
                <input type="text" id="calculatorSearch" name="q" placeholder="계산기 이름이나 설명으로 찾기" />
                <button class="ghost-btn directory-search-submit" type="submit">검색</button>
              </div>
            </label>
            <div class="directory-toolbar-note">필요한 계산기만 결과로 남기고 바로 이동하거나 추가할 수 있습니다.</div>
          </form>
        </section>

        <section class="section directory-results">
          <div class="directory-group-head">
            <h2>검색 결과</h2>
            <span id="calculatorSearchResultsCount">0개</span>
          </div>
          <div class="directory-results-actions">
            <a class="ghost-btn" href="../">전체 목록 보기</a>
          </div>
          <div class="directory-table" id="calculatorSearchResultsList"></div>
          <p class="empty-state" id="calculatorSearchEmpty" hidden>검색 결과가 없습니다.</p>
        </section>
      </main>
    </div>
  </body>
</html>
