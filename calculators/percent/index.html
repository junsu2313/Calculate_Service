<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>퍼센트 계산기 | 생활 속 계산기</title>
    <meta
      name="description"
      content="기준 값 대비 비율과 증감률을 계산할 수 있는 무료 퍼센트 계산기입니다."
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="퍼센트 계산기 | 생활 속 계산기" />
    <meta property="og:description" content="퍼센트와 증감률을 빠르게 계산하세요." />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://calc.underlab.work/calculators/percent/" />
    <link rel="canonical" href="https://calc.underlab.work/calculators/percent/" />
    <link rel="stylesheet" href="../../styles.css" />
    <script defer src="../../js/common.js"></script>
    <script defer src="../../js/site-pages.js"></script>
    <script defer src="../../theme.js"></script>
    <script defer src="../../js/pages/percent.js"></script>
    <script defer src="../../js/calculators.js"></script>
  </head>
  <body class="calc-page" data-calculator="percent">
    <div class="page-shell">
      <nav class="topbar">
        <a class="brand" href="../../">생활 속 계산기</a>
        <div class="topbar-actions">
          <div class="topbar-links">
            <a href="../../">홈</a>
            <a href="../../notices/">공지사항</a>
            <a href="../discount/">할인율</a>
            <a href="../age/">만나이</a>
            <a href="../loan/">대출</a>
          </div>
          <button class="ghost-btn theme-toggle" id="themeToggle" type="button">다크 모드</button>
        </div>
      </nav>

      <header class="calc-hero section salary-hero">
        <div class="crumbs"><a href="../../">홈</a> / 퍼센트 계산기</div>
        <p class="eyebrow">비율 계산기</p>
        <h1>퍼센트 계산기</h1>
        <p class="article-lead">비율과 증감률을 한 번에 계산할 수 있습니다.</p>
        <div class="hero-actions">
          <button class="ghost-btn" id="shareButton" type="button">링크 복사</button>
          <a class="primary-btn home-primary-btn" href="../../">홈으로 이동</a>
        </div>
      </header>

      <main class="section article-grid">
        <article class="article-card">
          <h2>퍼센트 계산</h2>
          <form class="form-grid">
            <label>
              기준 값
              <input type="number" id="percentBase" min="0" max="1000000000" step="0.1" value="200" />
            </label>
            <label>
              일부 값
              <input type="number" id="percentPart" min="0" max="1000000000" step="0.1" value="36" />
            </label>
            <label>
              변화 전 값
              <input type="number" id="percentChangeFrom" min="0" max="1000000000" step="0.1" value="120" />
            </label>
            <label>
              변화 후 값
              <input type="number" id="percentChangeTo" min="0" max="1000000000" step="0.1" value="150" />
            </label>
          </form>
          <div class="result-card" id="percentResult"></div>
        </article>

        <aside class="sidebar-stack">
          <div class="mini-card">
            <p class="mini-label">관련 계산기</p>
            <div class="related-grid">
              <a class="related-card" href="../discount/">
                <strong>할인율 계산기</strong>
                <p>정가와 할인율 기준 금액을 계산합니다.</p>
              </a>
              <a class="related-card" href="../salary/">
                <strong>연봉 실수령액 계산기</strong>
                <p>월 실수령액을 계산합니다.</p>
              </a>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
