<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>할인율 계산기 | 생활 속 계산기</title>
    <meta
      name="description"
      content="정가와 할인율, 추가 할인 금액을 입력하면 최종 결제 금액을 계산할 수 있는 무료 할인율 계산기입니다."
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="할인율 계산기 | 생활 속 계산기" />
    <meta property="og:description" content="정가와 할인율 기준 최종 금액을 빠르게 계산하세요." />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://example.com/calculators/discount/" />
    <link rel="canonical" href="https://example.com/calculators/discount/" />
    <link rel="stylesheet" href="../../styles.css" />
    <script defer src="../../js/common.js"></script>
    <script defer src="../../js/site-pages.js"></script>
    <script defer src="../../theme.js"></script>
    <script defer src="../../js/pages/discount.js"></script>
    <script defer src="../../js/calculators.js"></script>
  </head>
  <body class="calc-page" data-calculator="discount">
    <div class="page-shell">
      <nav class="topbar">
        <a class="brand" href="../../">생활 속 계산기</a>
        <div class="topbar-actions">
          <div class="topbar-links">
            <a href="../../">홈</a>
            <a href="../../notices/">공지사항</a>
            <a href="../percent/">퍼센트</a>
            <a href="../loan/">대출</a>
            <a href="../age/">만나이</a>
          </div>
          <button class="ghost-btn theme-toggle" id="themeToggle" type="button">다크 모드</button>
        </div>
      </nav>

      <header class="calc-hero section salary-hero">
        <div class="crumbs"><a href="../../">홈</a> / 할인율 계산기</div>
        <p class="eyebrow">쇼핑 계산기</p>
        <h1>할인율 계산기</h1>
        <p class="article-lead">정가와 할인율, 추가 할인 금액을 입력하면 최종 결제 금액을 계산할 수 있습니다.</p>
        <div class="hero-actions">
          <button class="ghost-btn" id="shareButton" type="button">링크 복사</button>
          <a class="primary-btn home-primary-btn" href="../../">홈으로 이동</a>
        </div>
      </header>

      <main class="section article-grid">
        <article class="article-card">
          <h2>할인 금액 계산</h2>
          <form class="form-grid">
            <label>
              정가
              <input type="number" id="discountPrice" min="0" max="1000000000" step="1" value="129000" />
            </label>
            <label>
              할인율(%)
              <input type="number" id="discountRate" min="0" max="100" step="0.1" value="15" />
            </label>
            <label>
              추가 할인 금액
              <input type="number" id="discountExtra" min="0" max="1000000000" step="1" value="5000" />
            </label>
          </form>
          <div class="result-card" id="discountResult"></div>
        </article>

        <aside class="sidebar-stack">
          <div class="mini-card">
            <p class="mini-label">관련 계산기</p>
            <div class="related-grid">
              <a class="related-card" href="../percent/">
                <strong>퍼센트 계산기</strong>
                <p>비율과 증감률을 계산합니다.</p>
              </a>
              <a class="related-card" href="../loan/">
                <strong>대출 상환 계산기</strong>
                <p>월 납입액과 총 이자를 계산합니다.</p>
              </a>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
