<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>만나이 계산기 | 생활 속 계산기</title>
    <meta
      name="description"
      content="출생일과 기준일을 입력하면 만나이와 연나이를 확인할 수 있는 무료 만나이 계산기입니다."
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="만나이 계산기 | 생활 속 계산기" />
    <meta property="og:description" content="출생일 기준 만나이와 연나이를 빠르게 계산하세요." />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://calc.underlab.work/calculators/age/" />
    <link rel="canonical" href="https://calc.underlab.work/calculators/age/" />
    <link rel="stylesheet" href="../../styles.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8529176175465863" crossorigin="anonymous"></script>
<script defer src="../../js/common.js"></script>
    <script defer src="../../js/site-pages.js"></script>
    <script defer src="../../theme.js"></script>
    <script defer src="../../js/pages/age.js"></script>
    <script defer src="../../js/calculators.js"></script>
  </head>
  <body class="calc-page" data-calculator="age">
    <div class="page-shell">
      <nav class="topbar">
        <a class="brand" href="../../">생활 속 계산기</a>
        <div class="topbar-actions">
          <div class="topbar-links">
            <a href="../../">홈</a>
            <a href="../../notices/">공지사항</a>
            <a href="../date/">날짜</a>
            <a href="../percent/">퍼센트</a>
            <a href="../discount/">할인율</a>
          </div>
          <button class="ghost-btn theme-toggle" id="themeToggle" type="button">다크 모드</button>
        </div>
      </nav>

      <header class="calc-hero section salary-hero">
        <div class="crumbs"><a href="../../">홈</a> / 만나이 계산기</div>
        <p class="eyebrow">생활 계산기</p>
        <h1>만나이 계산기</h1>
        <p class="article-lead">출생일과 기준일을 입력하면 만나이와 연나이를 계산할 수 있습니다.</p>
        <div class="hero-actions">
          <button class="ghost-btn" id="shareButton" type="button">링크 복사</button>
          <a class="primary-btn home-primary-btn" href="../../">홈으로 이동</a>
        </div>
      </header>

      <main class="section article-grid">
        <article class="article-card">
          <h2>만나이 계산</h2>
          <form class="form-grid">
            <label>
              출생일
              <input type="text" id="ageBirth" inputmode="numeric" maxlength="10" placeholder="1995-05-15" />
            </label>
            <label>
              기준일
              <input type="text" id="ageTarget" inputmode="numeric" maxlength="10" placeholder="2026-03-12" />
            </label>
          </form>
          <div class="result-card" id="ageResult"></div>

          <div class="faq-list">
            <details open>
              <summary>날짜는 어떤 형식으로 입력하나요?</summary>
              <p>YYYY-MM-DD 형식으로 입력하면 됩니다.</p>
            </details>
          </div>
        </article>

        <aside class="sidebar-stack">
          <div class="mini-card">
            <p class="mini-label">관련 계산기</p>
            <div class="related-grid">
              <a class="related-card" href="../date/">
                <strong>날짜 차이 계산기</strong>
                <p>두 날짜 사이 기간을 확인합니다.</p>
              </a>
              <a class="related-card" href="../percent/">
                <strong>퍼센트 계산기</strong>
                <p>비율과 증감률을 계산합니다.</p>
              </a>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
