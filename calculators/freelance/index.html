<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프리랜서 단가 계산기 | 생활 속 계산기</title>
    <meta name="description" content="목표 월수입과 작업일, 작업시간을 입력하면 권장 일당과 시간당 단가를 계산하는 무료 프리랜서 단가 계산기입니다." />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="프리랜서 단가 계산기 | 생활 속 계산기" />
    <meta property="og:description" content="목표 수입 기준 일당과 시간당 단가를 계산하세요." />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://example.com/calculators/freelance/" />
    <link rel="canonical" href="https://example.com/calculators/freelance/" />
    <link rel="stylesheet" href="../../styles.css" />
    <script defer src="../../js/common.js"></script>
    <script defer src="../../js/site-pages.js"></script>
    <script defer src="../../theme.js"></script>
    <script defer src="../../js/pages/freelance.js"></script>
    <script defer src="../../js/calculators.js"></script>
  </head>
  <body class="calc-page" data-calculator="freelance">
    <div class="page-shell">
      <nav class="topbar">
        <a class="brand" href="../../">생활 속 계산기</a>
        <div class="topbar-actions">
          <div class="topbar-links">
            <a href="../../">홈</a>
            <a href="../../notices/">공지사항</a>
            <a href="../vat/">부가세</a>
            <a href="../salary/">연봉</a>
          </div>
          <button class="ghost-btn theme-toggle" id="themeToggle" type="button">다크 모드</button>
        </div>
      </nav>

      <header class="calc-hero section salary-hero">
        <div class="crumbs"><a href="../../">홈</a> / 프리랜서 단가 계산기</div>
        <p class="eyebrow">수입 계산기</p>
        <h1>프리랜서 단가 계산기</h1>
        <p class="article-lead">목표 월수입과 작업일, 작업시간을 기준으로 권장 일당과 시간당 단가를 계산할 수 있습니다.</p>
        <div class="hero-actions">
          <button class="ghost-btn" id="shareButton" type="button">링크 복사</button>
          <a class="primary-btn home-primary-btn" href="../../">홈으로 이동</a>
        </div>
      </header>

      <main class="section article-grid">
        <article class="article-card">
          <h2>단가 계산</h2>
          <form class="form-grid">
            <label>
              목표 월수입
              <div class="input-with-unit">
                <input type="text" id="freelanceTargetIncome" inputmode="numeric" maxlength="13" value="450" />
                <span class="input-unit">만원</span>
              </div>
            </label>
            <label>
              월 작업일수
              <input type="number" id="freelanceWorkDays" min="1" max="31" step="1" value="18" />
            </label>
            <label>
              하루 작업시간
              <input type="number" id="freelanceHoursPerDay" min="1" max="24" step="1" value="6" />
            </label>
            <label>
              <span class="label-with-help">
                <span>비용/세금 반영률(%)</span>
                <span class="help-tooltip">
                  <button
                    class="help-trigger"
                    type="button"
                    aria-label="비용/세금 반영률 설명 보기"
                  >
                    !
                  </button>
                  <span class="help-bubble" role="tooltip">
                    세금, 플랫폼 수수료, 장비비처럼 실제로 빠질 수 있는 여유 비용 비율입니다.
                  </span>
                </span>
              </span>
              <input type="number" id="freelanceReserveRate" min="0" max="100" step="0.1" value="15" />
            </label>
          </form>
          <div class="result-card" id="freelanceResult"></div>
        </article>

        <aside class="sidebar-stack">
          <div class="mini-card">
            <p class="mini-label">관련 계산기</p>
            <div class="related-grid">
              <a class="related-card" href="../salary/">
                <strong>연봉 실수령액 계산기</strong>
                <p>월 실수령액을 계산합니다.</p>
              </a>
              <a class="related-card" href="../vat/">
                <strong>부가세 계산기</strong>
                <p>공급가와 부가세를 나눠 계산합니다.</p>
              </a>
              <a class="related-card" href="../discount/">
                <strong>할인율 계산기</strong>
                <p>정가와 할인율 기준 금액을 계산합니다.</p>
              </a>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
