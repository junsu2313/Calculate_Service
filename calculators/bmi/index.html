<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI 계산기 | 생활 속 계산기</title>
    <meta
      name="description"
      content="키와 몸무게를 입력하면 BMI를 계산하고 기본 건강 분류를 보여주는 무료 BMI 계산기입니다."
    />
    <meta name="keywords" content="BMI 계산기, 체질량지수 계산기, 키 몸무게 계산기, BMI 측정, 비만도 계산기" />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="BMI 계산기 | 생활 속 계산기" />
    <meta property="og:description" content="키와 몸무게로 BMI를 간단히 계산하세요." />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://calc.underlab.work/calculators/bmi/" />
    <link rel="canonical" href="https://calc.underlab.work/calculators/bmi/" />
    <link rel="stylesheet" href="../../styles.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8529176175465863" crossorigin="anonymous"></script>
<script defer src="../../js/common.js"></script>
    <script defer src="../../js/site-pages.js"></script>
    <script defer src="../../theme.js"></script>
    <script defer src="../../js/pages/bmi.js"></script>
    <script defer src="../../js/calculators.js"></script>
  </head>
  <body class="calc-page" data-calculator="bmi">
    <div class="page-shell">
      <nav class="topbar">
        <a class="brand" href="../../">생활 속 계산기</a>
        <div class="topbar-actions">
          <div class="topbar-links">
            <a href="../../">홈</a>
            <a href="../../notices/">공지사항</a>
            <a href="../salary/">연봉</a>
            <a href="../loan/">대출</a>
            <a href="../date/">날짜</a>
          </div>
          <button class="ghost-btn theme-toggle" id="themeToggle" type="button">다크 모드</button>
        </div>
      </nav>

      <header class="calc-hero section salary-hero">
        <div class="crumbs"><a href="../../">홈</a> / BMI 계산기</div>
        <p class="eyebrow">BMI 계산기</p>
        <h1>BMI 계산기</h1>
        <p class="article-lead">
          키와 몸무게를 입력하면 BMI와 기본 분류를 확인할 수 있습니다.
        </p>
        <div class="hero-actions">
          <button class="ghost-btn" id="shareButton" type="button">링크 복사</button>
          <a class="primary-btn home-primary-btn" href="../../">홈으로 이동</a>
        </div>
      </header>

      <main class="section article-grid">
        <article class="article-card">
          <h2>BMI 바로 계산</h2>
          <form class="form-grid">
            <label>
              키(cm)
              <input type="number" id="bmiHeight" min="0" max="300" step="0.1" value="172" />
            </label>
            <label>
              몸무게(kg)
              <input type="number" id="bmiWeight" min="0" max="500" step="0.1" value="68" />
            </label>
          </form>
          <div class="result-card" id="bmiResult"></div>

          <div class="faq-list">
            <details open>
              <summary>정상 범위는 어떻게 보나요?</summary>
              <p>일반적으로 18.5 이상 22.9 이하를 정상 범위 참고값으로 많이 사용합니다.</p>
            </details>
          </div>
        </article>

        <aside class="sidebar-stack">
          <div class="mini-card">
            <p class="mini-label">관련 계산기</p>
            <div class="related-grid">
              <a class="related-card" href="../date/">
                <strong>날짜 차이 계산기</strong>
                <p>날짜 차이와 개월 수를 계산합니다.</p>
              </a>
              <a class="related-card" href="../salary/">
                <strong>연봉 실수령액 계산기</strong>
                <p>월 실수령액을 확인합니다.</p>
              </a>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
