<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 페이지 | 생활 속 계산기</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="../styles.css" />
    <script src="../js/admin-guard.js"></script>
    <script defer src="../js/common.js"></script>
    <script defer src="../js/site-pages.js"></script>
    <script defer src="../theme.js"></script>
  </head>
  <body class="calc-page">
    <div class="page-shell">
      <nav class="topbar">
        <a class="brand" href="../">생활 속 계산기</a>
        <div class="topbar-actions">
          <div class="topbar-links">
            <a href="../">홈</a>
            <a href="../notices/">공지사항</a>
            <a href="../contact/">문의하기</a>
          </div>
          <button class="ghost-btn theme-toggle" id="themeToggle" type="button">다크 모드</button>
        </div>
      </nav>

      <header class="calc-hero section salary-hero">
        <div class="crumbs"><a href="../">홈</a> / 관리자 페이지</div>
        <h1>관리자 페이지</h1>
        <p class="article-lead">운영에 필요한 작성과 점검 작업을 이곳에서 진행합니다.</p>
      </header>

      <main class="section article-grid">
        <article class="article-card">
          <h2>관리 메뉴</h2>
          <div class="directory-list">
            <article class="directory-item">
              <div class="directory-copy">
                <strong>공지 작성</strong>
                <p>공지 제목과 본문을 입력하고 바로 반영할 수 있습니다.</p>
              </div>
              <div class="directory-actions">
                <a class="text-link" href="/admin/notices/">페이지 이동</a>
                <a class="ghost-btn" href="/admin/notices/">열기</a>
              </div>
            </article>
          </div>
        </article>

        <aside class="sidebar-stack">
          <div class="mini-card">
            <p class="mini-label">접근 안내</p>
            <p>이 페이지는 검색 노출과 일반 접근을 줄이기 위해 <code>noindex</code>와 <code>robots</code> 차단이 적용됩니다.</p>
          </div>
          <div class="mini-card">
            <p class="mini-label">운영 메모</p>
            <ul>
              <li>실제 접근 제어는 Cloudflare 단계에서 진행합니다.</li>
              <li>공지 데이터는 <code>data/notices.json</code>을 기준으로 반영됩니다.</li>
            </ul>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
