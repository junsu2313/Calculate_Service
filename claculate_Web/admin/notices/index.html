<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공지 작성 | 생활 속 계산기</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="../../styles.css" />
    <script src="../../js/admin-guard.js"></script>
    <script defer src="../../js/common.js"></script>
    <script defer src="../../js/site-pages.js"></script>
    <script defer src="../../theme.js"></script>
    <script defer src="../../js/notice-admin.js"></script>
  </head>
  <body class="calc-page">
    <div class="page-shell">
      <nav class="topbar">
        <a class="brand" href="../../">생활 속 계산기</a>
        <div class="topbar-actions">
          <div class="topbar-links">
            <a href="../../">홈</a>
            <a href="/admin/">관리자 페이지</a>
            <a href="../../notices/">공지사항</a>
            <a href="../../contact/">문의하기</a>
          </div>
          <button class="ghost-btn theme-toggle" id="themeToggle" type="button">다크 모드</button>
        </div>
      </nav>

      <header class="calc-hero section salary-hero">
        <div class="crumbs"><a href="../../">홈</a> / <a href="/admin/">관리자 페이지</a> / 공지 작성</div>
        <h1>공지 작성</h1>
        <p class="article-lead">제목과 본문을 입력하면 오늘 날짜로 공지 데이터가 만들어집니다.</p>
      </header>

      <main class="section article-grid">
        <article class="article-card">
          <h2>공지 입력</h2>
          <form class="contact-form" id="noticeAdminForm">
            <label>
              구분
              <select id="noticeCategory">
                <option value="업데이트">업데이트</option>
                <option value="운영 안내">운영 안내</option>
                <option value="안내">안내</option>
                <option value="점검">점검</option>
              </select>
            </label>
            <label>
              목록 제목
              <input type="text" id="noticeShortTitle" maxlength="12" placeholder="예: 계산기 추가" />
            </label>
            <label>
              공지 제목
              <input type="text" id="noticeTitle" maxlength="80" placeholder="예: 프리랜서 단가 계산기를 추가했습니다." />
            </label>
            <label>
              공지 내용
              <textarea id="noticeBody" placeholder="공지 내용을 입력해 주세요."></textarea>
            </label>
            <div class="contact-actions">
              <button class="primary-btn home-primary-btn" id="noticePublishButton" type="submit">공지 발행</button>
              <button class="ghost-btn" id="noticeConnectButton" type="button">데이터 파일 연결</button>
            </div>
            <p class="form-feedback" id="noticeAdminFeedback" aria-live="polite"></p>
          </form>
        </article>

        <aside class="sidebar-stack">
          <div class="surface-note">
            브라우저에서 <code>data/notices.json</code> 파일을 바로 연결할 수 있습니다.
          </div>
          <div class="mini-card">
            <p class="mini-label">작성 방식</p>
            <ul>
              <li>날짜는 발행 시 자동으로 입력됩니다.</li>
              <li>파일을 연결한 뒤 발행하면 공지 데이터가 바로 갱신됩니다.</li>
              <li>지원되지 않는 브라우저에서는 JSON 파일을 내려받습니다.</li>
            </ul>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
